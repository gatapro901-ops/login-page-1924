<!DOCTYPE html>
<html lang='ar' dir='rtl'>
  <head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>تسجيل الدخول</title>
    <link href='https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css' rel='stylesheet'>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css'>
    <link rel='preconnect' href='https://fonts.googleapis.com'>
    <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
    <link href='https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap' rel='stylesheet'>
  </head>
  <body class='h-screen flex justify-center items-center bg-slate-950'>
    <div class='bg-slate-900 bg-gradient-to-r from-slate-800 to-slate-900 shadow-2xl shadow-slate-800 rounded-3xl p-10 w-80 h-96 flex flex-col justify-center items-center'>
      <h1 class='text-4xl font-bold text-white mb-10 animate-pulse'>تسجيل الدخول</h1>
      <input type='email' placeholder='الإيميل' class='p-2 pl-10 text-sm text-white rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-slate-500 w-full mb-5 bg-slate-800'>
      <input type='password' placeholder='كلمة المرور' class='p-2 pl-10 text-sm text-white rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-slate-500 w-full mb-5 bg-slate-800'>
      <input type='password' placeholder='تأكيد كلمة المرور' class='p-2 pl-10 text-sm text-white rounded-lg shadow-md focus:outline-none focus:ring-2 focus:ring-slate-500 w-full mb-5 bg-slate-800'>
      <button class='bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 px-4 rounded-lg mb-5 w-full'>تسجيل الدخول</button>
    </div>
  </body>
  <style>
    .animate-pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(0.9);
      }
    }
  </style>
</html>
